<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz!</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body {
      background: linear-gradient(135deg, #2d0a5e, #46178f);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 48px;
      letter-spacing: 4px;
    }
    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.card {
      display: block;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      padding: 40px 48px;
      color: #fff;
      text-decoration: none;
      transition: transform 0.2s, background 0.2s;
      min-width: 220px;
    }
    a.card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.2);
    }
    .card-icon { font-size: 3rem; margin-bottom: 12px; }
    .card-title { font-size: 1.4rem; font-weight: 700; }
    .card-desc { font-size: 0.9rem; opacity: 0.7; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>QUIZ!</h1>
    <div class="cards">
      <a href="/host" class="card">
        <div class="card-icon">🖥️</div>
        <div class="card-title">Host</div>
        <div class="card-desc">Quiz auf dem Beamer starten</div>
      </a>
      <a href="/play" class="card">
        <div class="card-icon">📱</div>
        <div class="card-title">Mitspielen</div>
        <div class="card-desc">Mit dem Smartphone teilnehmen</div>
      </a>
    </div>
  </div>
</body>
</html>
