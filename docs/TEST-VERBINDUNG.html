<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz – Verbindungstest</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    input { font-size: 1.1rem; padding: 0.5rem; width: 8rem; }
    button { font-size: 1rem; padding: 0.5rem 1rem; margin: 0.25rem; cursor: pointer; }
    #log { background: #111; color: #0f0; padding: 1rem; border-radius: 8px; font: 0.85rem/1.4 monospace; white-space: pre-wrap; min-height: 200px; }
    .ok { color: #6f6; }
    .bad { color: #f66; }
  </style>
</head>
<body>
  <h1>Verbindungstest</h1>
  <p id="backend-info"></p>
  <input id="pin" placeholder="PIN" maxlength="6" inputmode="numeric">
  <button id="btn-host">Als Host testen</button>
  <button id="btn-player">Als Spieler testen</button>
  <pre id="log"></pre>
  <script src="js/config.js"></script>
  <script src="js/transport-mqtt.js?v=4"></script>
  <script>
    const logEl = document.getElementById('log');
    const cfg = window.QuizConfig || {};

    document.getElementById('backend-info').textContent =
      cfg.FIREBASE_DB_URL
        ? 'Backend: Firebase ✓'
        : cfg.RELAY_URL
          ? 'Backend: Relay ✓'
          : '⚠ Kein Server konfiguriert – FIREBASE-EINRICHTEN.bat ausführen';

    function log(msg, ok) {
      const line = document.createElement('div');
      line.className = ok ? 'ok' : 'bad';
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    document.getElementById('btn-host').onclick = async () => {
      logEl.innerHTML = '';
      const pin = document.getElementById('pin').value.trim();
      if (!pin) return log('PIN fehlt', false);
      log('Host-Test startet…');
      const t = new QuizTransport(pin, 'host');
      try {
        await t.connect();
        log('Verbindung OK', true);
        t.destroy();
      } catch (e) {
        log('FEHLER: ' + e.message, false);
      }
    };

    document.getElementById('btn-player').onclick = async () => {
      logEl.innerHTML = '';
      const pin = document.getElementById('pin').value.trim();
      if (!pin) return log('PIN fehlt', false);
      log('Spieler-Test startet…');
      const t = new QuizTransport(pin, 'player');
      let hostReady = false;
      t.onMessage = (m) => {
        if (m.type === 'host-ready') hostReady = true;
      };
      try {
        await t.connect();
        log('Verbindung OK – warte auf Host…', true);
        await new Promise((r) => setTimeout(r, 3000));
        log(hostReady ? 'Host gefunden ✓' : 'Host nicht aktiv (Beamer: Spiel erstellen?)', hostReady);
        t.sendToHost({ type: 'join', name: 'Test' });
        log('Join gesendet', true);
        t.destroy();
      } catch (e) {
        log('FEHLER: ' + e.message, false);
      }
    };
  </script>
</body>
</html>
